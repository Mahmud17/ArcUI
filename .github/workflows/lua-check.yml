name: Lua Syntax Check

on:
  push:
  pull_request:

jobs:
  lua-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: sudo apt-get install -y lua5.1

      - name: Check syntax
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            if ! luac5.1 -p "$file" 2>&1; then
              failed=1
            fi
          done < <(find . -name "*.lua" -not -path "./Libs/*" -print0)
          exit $failed
